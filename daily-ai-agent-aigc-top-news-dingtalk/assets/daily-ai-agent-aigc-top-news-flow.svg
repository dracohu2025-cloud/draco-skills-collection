<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">daily-ai-agent-aigc-top-news workflow</title>
  <desc id="desc">Workflow diagram for daily AI Agent AIGC briefing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="160" fill="#2563eb" opacity="0.14"/>
  <circle cx="110" cy="420" r="180" fill="#f59e0b" opacity="0.10"/>

  <text x="70" y="78" fill="#f8fafc" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">Daily AI / Agent / AIGC Top News</text>
  <text x="70" y="116" fill="#cbd5e1" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">抓取候选 → 来源核验 → 中文早报 → 钉钉发布 → 多维表归档</text>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" filter="url(#shadow)">
    <g transform="translate(70,175)">
      <rect width="180" height="120" rx="20" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="42" fill="#93c5fd" font-size="15" font-weight="700">01 Collect</text>
      <text x="24" y="73" fill="#f8fafc" font-size="24" font-weight="800">抓候选</text>
      <text x="24" y="99" fill="#cbd5e1" font-size="14">HN / GitHub / HF</text>
    </g>
    <g transform="translate(300,175)">
      <rect width="180" height="120" rx="20" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="42" fill="#93c5fd" font-size="15" font-weight="700">02 Verify</text>
      <text x="24" y="73" fill="#f8fafc" font-size="24" font-weight="800">核验来源</text>
      <text x="24" y="99" fill="#cbd5e1" font-size="14">官方 / API / PR</text>
    </g>
    <g transform="translate(530,175)">
      <rect width="180" height="120" rx="20" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="42" fill="#93c5fd" font-size="15" font-weight="700">03 Write</text>
      <text x="24" y="73" fill="#f8fafc" font-size="24" font-weight="800">写早报</text>
      <text x="24" y="99" fill="#cbd5e1" font-size="14">Top3 + 分类摘要</text>
    </g>
    <g transform="translate(760,175)">
      <rect width="180" height="120" rx="20" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="42" fill="#93c5fd" font-size="15" font-weight="700">04 Publish</text>
      <text x="24" y="73" fill="#f8fafc" font-size="24" font-weight="800">发钉钉</text>
      <text x="24" y="99" fill="#cbd5e1" font-size="14">docx + fetch 验收</text>
    </g>
    <g transform="translate(990,175)">
      <rect width="140" height="120" rx="20" fill="url(#card)" stroke="#334155"/>
      <text x="22" y="42" fill="#93c5fd" font-size="15" font-weight="700">05 Archive</text>
      <text x="22" y="73" fill="#f8fafc" font-size="24" font-weight="800">归档</text>
      <text x="22" y="99" fill="#cbd5e1" font-size="14">Bitable</text>
    </g>
  </g>

  <g stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <line x1="255" y1="235" x2="292" y2="235"/>
    <line x1="485" y1="235" x2="522" y2="235"/>
    <line x1="715" y1="235" x2="752" y2="235"/>
    <line x1="945" y1="235" x2="982" y2="235"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="70" y="360" width="1060" height="82" rx="20" fill="#020617" opacity="0.66" stroke="#334155"/>
    <text x="102" y="395" fill="#fbbf24" font-size="17" font-weight="800">Hard rules</text>
    <text x="102" y="424" fill="#e5e7eb" font-size="16">真实性优先 · Trending 只写趋势信号 · AIGC 生图/生视频每天必查 · 钉钉文档和多维表都要回读验收</text>
  </g>
</svg>
