<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Feishu Bitable Video Baseline Completion workflow</title>
  <desc id="desc">End-to-end workflow from brief, reference assets, video payload, generation, QA, and Feishu Base baseline verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#f8fafc}
      .sub{font:400 17px Inter,Arial,sans-serif;fill:#94a3b8}
      .box{fill:url(#card);stroke:#334155;stroke-width:1.5;rx:20;filter:url(#shadow)}
      .box2{fill:#0f172a;stroke:#475569;stroke-width:1.2;rx:16}
      .h{font:700 20px Inter,Arial,sans-serif;fill:#e2e8f0}
      .p{font:400 15px Inter,Arial,sans-serif;fill:#a5b4fc}
      .tiny{font:400 13px Inter,Arial,sans-serif;fill:#94a3b8}
      .num{font:700 15px Inter,Arial,sans-serif;fill:#020617}
      .badge{fill:#67e8f9}
      .line{stroke:#67e8f9;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#818cf8;stroke-width:2;stroke-dasharray:7 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="64" y="62" class="title">Feishu Bitable Video Baseline Workflow</text>
  <text x="64" y="93" class="sub">Generate CRS / SES assets, build Seedance payload, QA the result, then complete one auditable Base row.</text>

  <g transform="translate(64 140)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">1</text>
    <text x="64" y="38" class="h">Brief + Base Row</text>
    <text x="24" y="72" class="p">story, characters, scene</text>
    <text x="24" y="96" class="tiny">reserve / inspect target record</text>
  </g>

  <g transform="translate(364 140)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">2</text>
    <text x="64" y="38" class="h">CRS Assets</text>
    <text x="24" y="72" class="p">Character Reference Sheet</text>
    <text x="24" y="96" class="tiny">prompt → image → QA → attach</text>
  </g>

  <g transform="translate(664 140)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">3</text>
    <text x="64" y="38" class="h">SES Asset</text>
    <text x="24" y="72" class="p">Scene / Environment</text>
    <text x="24" y="96" class="tiny">no text, no characters</text>
  </g>

  <g transform="translate(964 140)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">4</text>
    <text x="64" y="38" class="h">Optional Motion Ref</text>
    <text x="24" y="72" class="p">keyframe / blocking map</text>
    <text x="24" y="96" class="tiny">only when action needs lock</text>
  </g>

  <path class="line" d="M294 198 H354"/>
  <path class="line" d="M594 198 H654"/>
  <path class="line" d="M894 198 H954"/>

  <g transform="translate(64 370)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">5</text>
    <text x="64" y="38" class="h">Payload</text>
    <text x="24" y="72" class="p">Seedance-ready prompt</text>
    <text x="24" y="96" class="tiny">content[] order + URLs</text>
  </g>

  <g transform="translate(364 370)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">6</text>
    <text x="64" y="38" class="h">Video Generation</text>
    <text x="24" y="72" class="p">submit once, save task id</text>
    <text x="24" y="96" class="tiny">tokens + cost tracked</text>
  </g>

  <g transform="translate(664 370)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">7</text>
    <text x="64" y="38" class="h">QA</text>
    <text x="24" y="72" class="p">ffprobe + contact sheet</text>
    <text x="24" y="96" class="tiny">audio transcript if needed</text>
  </g>

  <g transform="translate(964 370)">
    <rect class="box" width="230" height="116"/>
    <circle class="badge" cx="34" cy="34" r="16"/><text x="29" y="39" class="num">8</text>
    <text x="64" y="38" class="h">Baseline Row</text>
    <text x="24" y="72" class="p">attachments + prompts</text>
    <text x="24" y="96" class="tiny">Prompt_Output_Map verified</text>
  </g>

  <path class="line" d="M179 256 V340 Q179 370 209 370 H54" transform="translate(250 0)" opacity="0"/>
  <path class="line" d="M1079 256 V313 Q1079 340 1049 340 H209 Q179 340 179 370"/>
  <path class="line" d="M294 428 H354"/>
  <path class="line" d="M594 428 H654"/>
  <path class="line" d="M894 428 H954"/>

  <g transform="translate(64 570)">
    <rect class="box2" width="1130" height="74"/>
    <text x="28" y="31" class="h">Safety Gate</text>
    <text x="28" y="56" class="tiny">No credentials in prompts, docs, commits, summaries, or examples. Re-read Base row before reporting completion. missing_count must be 0 for the intended field set.</text>
  </g>
  <path class="dash" d="M1079 486 V570"/>
</svg>
