<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Open Design to Open Slide workflow preview</title>
  <desc id="desc">Workflow diagram showing Open Design visual mining, React rebuild, and screenshot QA for Open Slide templates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="36" fill="url(#bg)"/>
  <circle cx="1010" cy="92" r="185" fill="#a78bfa" opacity="0.14"/>
  <circle cx="170" cy="600" r="260" fill="#22d3ee" opacity="0.10"/>
  <path d="M80 104h1040" stroke="url(#accent)" stroke-width="3" opacity="0.75"/>

  <text x="80" y="76" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">Open Design → Open Slide</text>
  <text x="80" y="134" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" fill="#cbd5e1">Mine visual systems. Rebuild with React. Verify every page.</text>

  <g filter="url(#shadow)">
    <rect x="74" y="188" width="308" height="334" rx="28" fill="url(#card)" stroke="#334155"/>
    <rect x="108" y="224" width="126" height="18" rx="9" fill="#f59e0b"/>
    <text x="108" y="286" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#fff7ed">01 Mine</text>
    <text x="108" y="326" font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="#cbd5e1">Open Design corpus</text>
    <text x="108" y="366" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• palette / type</text>
    <text x="108" y="398" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• card rhythm</text>
    <text x="108" y="430" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• page archetypes</text>
    <rect x="108" y="462" width="210" height="22" rx="11" fill="#f59e0b" opacity="0.22"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="446" y="188" width="308" height="334" rx="28" fill="url(#card)" stroke="#334155"/>
    <rect x="480" y="224" width="126" height="18" rx="9" fill="#22d3ee"/>
    <text x="480" y="286" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#ecfeff">02 Rebuild</text>
    <text x="480" y="326" font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="#cbd5e1">Open Slide React</text>
    <text x="480" y="366" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• Page[] export</text>
    <text x="480" y="398" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• 20-page album</text>
    <text x="480" y="430" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• no OD runtime</text>
    <rect x="480" y="462" width="210" height="22" rx="11" fill="#22d3ee" opacity="0.22"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="818" y="188" width="308" height="334" rx="28" fill="url(#card)" stroke="#334155"/>
    <rect x="852" y="224" width="126" height="18" rx="9" fill="#a78bfa"/>
    <text x="852" y="286" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800" fill="#f5f3ff">03 Verify</text>
    <text x="852" y="326" font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="#cbd5e1">Screenshot QA</text>
    <text x="852" y="366" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• build / route</text>
    <text x="852" y="398" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• hash uniqueness</text>
    <text x="852" y="430" font-family="Inter, ui-sans-serif, system-ui" font-size="17" fill="#94a3b8">• contact sheet</text>
    <rect x="852" y="462" width="210" height="22" rx="11" fill="#a78bfa" opacity="0.22"/>
  </g>

  <path d="M394 354h38" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M428 342l16 12-16 12" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M766 354h38" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M800 342l16 12-16 12" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="282" y="570" width="636" height="48" rx="24" fill="#020617" opacity="0.72" stroke="#334155"/>
  <text x="600" y="602" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#e2e8f0">20-page template suites · React primitives · public-safe docs</text>
</svg>
