<svg width="1200" height="640" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">wechat-article-browseruse workflow preview</title>
  <desc id="desc">微信公众号文章通过 BrowserUse 抓取后，转换为 Markdown 并导入飞书原生文档的流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#fb923c" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#f97316"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="640" rx="28" fill="url(#bg)"/>
  <text x="72" y="88" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="700" fill="#7c2d12">BrowserUse 抓公众号 → 飞书原生文档</text>
  <text x="72" y="128" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#9a3412">一个目录即可独立运行：抓取、清洗、发布、回读校验。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="250" height="230" rx="28" fill="url(#card)" stroke="#fdba74" stroke-width="2"/>
    <rect x="370" y="210" width="250" height="230" rx="28" fill="url(#card)" stroke="#fdba74" stroke-width="2"/>
    <rect x="670" y="210" width="250" height="230" rx="28" fill="url(#card)" stroke="#fdba74" stroke-width="2"/>
    <rect x="970" y="210" width="170" height="230" rx="28" fill="url(#card)" stroke="#fdba74" stroke-width="2"/>
  </g>

  <text x="100" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#9a3412">1. BrowserUse 云浏览器</text>
  <text x="100" y="315" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">打开 mp.weixin.qq.com</text>
  <text x="100" y="347" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">连接 Playwright CDP</text>
  <text x="100" y="379" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">读取 #js_content / 图片</text>

  <text x="400" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#9a3412">2. 清洗与转换</text>
  <text x="400" y="315" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">去掉噪音节点</text>
  <text x="400" y="347" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">HTML → Markdown</text>
  <text x="400" y="379" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">保留标题、作者、发布时间</text>

  <text x="700" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#9a3412">3. 发布到飞书</text>
  <text x="700" y="315" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">drive +import 导入原生文档</text>
  <text x="700" y="347" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">支持指定 folder token</text>
  <text x="700" y="379" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">返回 doc_url 并回读校验</text>

  <text x="998" y="270" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#9a3412">产物</text>
  <text x="998" y="315" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">Markdown</text>
  <text x="998" y="347" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">JSON</text>
  <text x="998" y="379" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" fill="#7c2d12">Feishu Doc URL</text>

  <path d="M320 325 H355" stroke="#f97316" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M620 325 H655" stroke="#f97316" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M920 325 H955" stroke="#f97316" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <rect x="72" y="510" width="1060" height="76" rx="18" fill="#ffffff" opacity="0.78"/>
  <text x="100" y="557" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#7c2d12">命令入口：python3 scripts/run.py fetch &lt;url&gt; ｜ python3 scripts/run.py publish-feishu &lt;url&gt;</text>
</svg>
